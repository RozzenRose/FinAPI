services:
  web:
    build: .
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}

      - POSTGRES_FOR_TESTS_USER=${POSTGRES_FOR_TESTS_USER}
      - POSTGRES_FOR_TESTS_PASSWORD=${POSTGRES_FOR_TESTS_PASSWORD}
      - POSTGRES_FOR_TESTS_HOST=${POSTGRES_FOR_TESTS_HOST}
      - POSTGRES_FOR_TESTS_PORT=${POSTGRES_FOR_TESTS_PORT}
      - POSTGRES_FOR_TESTS_DB=${POSTGRES_FOR_TESTS_DB}
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: finapi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5000:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db_test:
    image: postgres:15-alpine
    container_name: finapi_test_db
    volumes:
      - postgres_test_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_FOR_TESTS_USER=${POSTGRES_FOR_TESTS_USER}
      - POSTGRES_FOR_TESTS_PASSWORD=${POSTGRES_FOR_TESTS_PASSWORD}
      - POSTGRES_FOR_TESTS_DB=${POSTGRES_FOR_TESTS_DB}
    ports:
      - "6000:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_test_data:
